<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Darshan English – Premium English Speaking Institute Since 1999. Master English, Build Confidence, Transform Your Life. Trusted by 1000+ students across Gujarat.">
<meta name="keywords" content="English speaking course, English institute Gujarat, Darshan English, learn English, eBooks, English coaching">
<title>Darshan English – Master English Since 1999</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0A1628;
    --royal: #1A3A6B;
    --blue: #1E4D9B;
    --gold: #C9A84C;
    --gold-light: #E8C96E;
    --gold-pale: #F5E6B8;
    --cream: #FAFAF7;
    --white: #FFFFFF;
    --text-dark: #0D1B2E;
    --text-mid: #3D5278;
    --text-light: #7A90B0;
    --border: rgba(201,168,76,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    overflow-x: hidden;
  }

  /* -- SCROLLBAR -- */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

  /* -- NAV -- */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    padding: 0 5%;
    display: flex; align-items: center; justify-content: space-between;
    height: 72px;
    background: rgba(10,22,40,0.96);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    transition: all 0.4s ease;
  }
  nav.scrolled {
    height: 60px;
    background: rgba(10,22,40,0.99);
    box-shadow: 0 4px 40px rgba(0,0,0,0.3);
  }
  .nav-logo {
    display: flex; align-items: center; gap: 12px;
    text-decoration: none;
  }
  .nav-logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 700;
    color: var(--navy);
  }
  .nav-logo-text { display: flex; flex-direction: column; line-height: 1.1; }
  .nav-logo-main {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px; font-weight: 700;
    color: var(--white); letter-spacing: 0.02em;
  }
  .nav-logo-sub { font-size: 10px; color: var(--gold); letter-spacing: 0.12em; font-weight: 500; }
  .nav-links {
    display: flex; align-items: center; gap: 32px;
    list-style: none;
  }
  .nav-links a {
    font-size: 13px; font-weight: 500; letter-spacing: 0.06em;
    color: rgba(255,255,255,0.75);
    text-decoration: none; text-transform: uppercase;
    transition: color 0.3s;
    position: relative;
  }
  .nav-links a::after {
    content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
    height: 1px; background: var(--gold); transform: scaleX(0);
    transition: transform 0.3s ease;
  }
  .nav-links a:hover { color: var(--gold-light); }
  .nav-links a:hover::after { transform: scaleX(1); }
  .nav-cta {
    background: linear-gradient(135deg, var(--gold), #B8913A);
    color: var(--navy) !important;
    padding: 9px 22px; border-radius: 4px;
    font-weight: 600 !important; font-size: 12px !important;
    letter-spacing: 0.08em !important;
    transition: all 0.3s ease !important;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  }
  .nav-cta:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(201,168,76,0.45) !important;
  }
  .nav-cta::after { display: none !important; }

  .hamburger {
    display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px;
  }
  .hamburger span {
    width: 24px; height: 2px; background: var(--white);
    transition: all 0.3s;
  }

  /* -- HERO -- */
  #hero {
    min-height: 100vh;
    background: var(--navy);
    position: relative; overflow: hidden;
    display: flex; align-items: center;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 60% 40%, rgba(30,77,155,0.35) 0%, transparent 65%),
      radial-gradient(ellipse 40% 40% at 10% 80%, rgba(201,168,76,0.08) 0%, transparent 60%);
  }
  .hero-grid {
    position: absolute; inset: 0; opacity: 0.04;
    background-image:
      linear-gradient(rgba(201,168,76,0.8) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.8) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .hero-ornament {
    position: absolute; right: -80px; top: 50%;
    transform: translateY(-50%);
    width: 600px; height: 600px;
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 50%;
    pointer-events: none;
  }
  .hero-ornament::before {
    content: ''; position: absolute; inset: 40px;
    border: 1px solid rgba(201,168,76,0.08);
    border-radius: 50%;
  }
  .hero-ornament::after {
    content: ''; position: absolute; inset: 80px;
    border: 1px solid rgba(201,168,76,0.05);
    border-radius: 50%;
  }
  .hero-content {
    position: relative; z-index: 2;
    width: 90%; max-width: 760px;
    margin: 0 auto;
    padding: 120px 5% 80px;
    animation: heroFadeUp 1s ease both;
  }
  @keyframes heroFadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 30px;
    padding: 6px 18px 6px 8px;
    margin-bottom: 36px;
    animation: heroFadeUp 1s 0.1s ease both;
  }
  .hero-badge-dot {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .hero-badge span {
    font-size: 12px; font-weight: 600; letter-spacing: 0.1em;
    color: var(--gold-light); text-transform: uppercase;
  }
  .hero-eyebrow {
    font-size: 12px; font-weight: 600; letter-spacing: 0.18em;
    color: var(--gold); text-transform: uppercase;
    margin-bottom: 20px;
    animation: heroFadeUp 1s 0.15s ease both;
  }
  .hero-headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(42px, 6vw, 80px);
    font-weight: 600; line-height: 1.08;
    color: var(--white);
    margin-bottom: 28px;
    animation: heroFadeUp 1s 0.2s ease both;
  }
  .hero-headline em {
    font-style: italic;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-sub {
    font-size: 18px; font-weight: 300; line-height: 1.7;
    color: rgba(255,255,255,0.65);
    max-width: 560px; margin-bottom: 20px;
    animation: heroFadeUp 1s 0.25s ease both;
  }
  .hero-trust {
    display: flex; align-items: center; gap: 24px;
    margin-bottom: 44px;
    animation: heroFadeUp 1s 0.3s ease both;
    flex-wrap: wrap;
  }
  .hero-trust-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,0.55);
  }
  .hero-trust-item span.dot { color: var(--gold); font-size: 18px; line-height: 1; }
  .hero-ctas {
    display: flex; gap: 16px; flex-wrap: wrap;
    animation: heroFadeUp 1s 0.35s ease both;
  }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, var(--gold) 0%, #B8913A 100%);
    color: var(--navy);
    padding: 16px 32px; border-radius: 4px;
    font-weight: 700; font-size: 14px; letter-spacing: 0.06em;
    text-decoration: none; text-transform: uppercase;
    transition: all 0.3s ease;
    box-shadow: 0 8px 32px rgba(201,168,76,0.35);
    border: none; cursor: pointer;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 40px rgba(201,168,76,0.5);
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%);
  }
  .btn-secondary {
    display: inline-flex; align-items: center; gap: 10px;
    background: transparent;
    color: var(--white);
    padding: 15px 32px; border-radius: 4px;
    font-weight: 600; font-size: 14px; letter-spacing: 0.06em;
    text-decoration: none; text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.3);
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .btn-secondary:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(201,168,76,0.06);
    transform: translateY(-2px);
  }
  .hero-stats {
    position: absolute; bottom: 48px; left: 5%; right: 5%;
    display: flex; gap: 0;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
    overflow: hidden;
    animation: heroFadeUp 1s 0.45s ease both;
    max-width: 700px;
  }
  .hero-stat {
    flex: 1; padding: 20px 24px;
    text-align: center;
    border-right: 1px solid rgba(201,168,76,0.15);
  }
  .hero-stat:last-child { border-right: none; }
  .hero-stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px; font-weight: 700;
    color: var(--gold-light); line-height: 1;
    margin-bottom: 4px;
  }
  .hero-stat-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
    color: rgba(255,255,255,0.45); text-transform: uppercase;
  }

  /* -- MARQUEE -- */
  .marquee-section {
    background: var(--gold);
    padding: 14px 0;
    overflow: hidden;
  }
  .marquee-track {
    display: flex; gap: 60px;
    animation: marquee 28s linear infinite;
    width: max-content;
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .marquee-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--navy); white-space: nowrap;
  }
  .marquee-item::after { content: '?'; opacity: 0.4; margin-left: 10px; }

  /* -- SECTION COMMONS -- */
  section { padding: 100px 5%; }
  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--gold);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-label::before {
    content: ''; display: block; width: 28px; height: 1px;
    background: var(--gold);
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 4.5vw, 58px);
    font-weight: 600; line-height: 1.12;
    color: var(--navy);
    margin-bottom: 20px;
  }
  .section-title em {
    font-style: italic; color: var(--blue);
  }
  .section-subtitle {
    font-size: 17px; font-weight: 300; line-height: 1.75;
    color: var(--text-mid); max-width: 560px;
  }

  /* -- ABOUT -- */
  #about { background: var(--white); }
  .about-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 80px; align-items: center;
    max-width: 1200px; margin: 0 auto;
  }
  .about-visual {
    position: relative;
  }
  .about-image-wrap {
    position: relative; border-radius: 4px; overflow: hidden;
    aspect-ratio: 4/5;
    background: linear-gradient(135deg, var(--royal) 0%, var(--navy) 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .about-image-inner {
    text-align: center; padding: 40px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  .about-emblem {
    width: 100px; height: 100px; border-radius: 50%;
    background: rgba(201,168,76,0.15);
    border: 2px solid rgba(201,168,76,0.4);
    display: flex; align-items: center; justify-content: center;
  }
  .about-emblem-inner {
    font-family: 'Cormorant Garamond', serif;
    font-size: 40px; font-weight: 700;
    color: var(--gold-light);
  }
  .about-year {
    font-family: 'Cormorant Garamond', serif;
    font-size: 72px; font-weight: 700; line-height: 1;
    color: rgba(201,168,76,0.2); letter-spacing: -2px;
  }
  .about-since {
    font-size: 13px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--gold);
  }
  .about-corner {
    position: absolute;
    width: 60px; height: 60px;
    border-color: var(--gold);
    border-style: solid;
  }
  .about-corner.tl { top: -12px; left: -12px; border-width: 2px 0 0 2px; }
  .about-corner.br { bottom: -12px; right: -12px; border-width: 0 2px 2px 0; }
  .about-float-badge {
    position: absolute; bottom: -20px; right: -20px;
    background: var(--gold);
    padding: 20px 24px; border-radius: 4px;
    text-align: center;
    box-shadow: 0 12px 40px rgba(201,168,76,0.4);
  }
  .about-float-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 40px; font-weight: 700; color: var(--navy); line-height: 1;
  }
  .about-float-text { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--navy); text-transform: uppercase; }
  .about-text { padding-left: 20px; }
  .about-body {
    font-size: 16px; line-height: 1.9; color: var(--text-mid);
    margin-bottom: 36px;
  }
  .about-body p { margin-bottom: 16px; }
  .about-values {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin-bottom: 40px;
  }
  .about-value {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    transition: all 0.3s;
  }
  .about-value:hover {
    border-color: var(--gold);
    background: rgba(201,168,76,0.04);
    transform: translateY(-2px);
  }
  .about-value-icon {
    width: 36px; height: 36px; border-radius: 4px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .about-value-text strong {
    display: block; font-size: 13px; font-weight: 700;
    color: var(--navy); margin-bottom: 2px;
  }
  .about-value-text span { font-size: 12px; color: var(--text-light); }

  /* -- WHY CHOOSE -- */
  #why { background: var(--cream); }
  .why-wrap { max-width: 1200px; margin: 0 auto; }
  .why-header { text-align: center; margin-bottom: 64px; }
  .why-header .section-label { justify-content: center; }
  .why-header .section-label::before { display: none; }
  .why-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 24px;
  }
  .why-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 36px 28px;
    text-align: center;
    position: relative; overflow: hidden;
    transition: all 0.4s ease;
    cursor: default;
  }
  .why-card::before {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transform: scaleX(0);
    transition: transform 0.4s ease;
  }
  .why-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 24px 60px rgba(26,58,107,0.12);
    border-color: rgba(201,168,76,0.4);
  }
  .why-card:hover::before { transform: scaleX(1); }
  .why-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 64px; font-weight: 700; line-height: 1;
    color: rgba(201,168,76,0.12);
    position: absolute; top: 12px; right: 16px;
  }
  .why-icon {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(30,77,155,0.08);
    border: 1.5px solid rgba(30,77,155,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; margin: 0 auto 20px;
    transition: all 0.3s;
  }
  .why-card:hover .why-icon {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-color: transparent;
  }
  .why-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 600;
    color: var(--navy); margin-bottom: 10px;
  }
  .why-desc { font-size: 14px; line-height: 1.7; color: var(--text-mid); }

  /* -- EBOOK STORE -- */
  #store { background: var(--navy); position: relative; overflow: hidden; }
  .store-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(30,77,155,0.3) 0%, transparent 70%);
  }
  .store-wrap { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; }
  .store-header { text-align: center; margin-bottom: 60px; }
  .store-header .section-label { justify-content: center; }
  .store-header .section-label::before { display: none; }
  .store-header .section-title { color: var(--white); }
  .store-header .section-subtitle { color: rgba(255,255,255,0.55); margin: 0 auto; }
  .store-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 28px; margin-bottom: 56px;
  }
  .book-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 8px; overflow: hidden;
    transition: all 0.4s ease;
  }
  .book-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 24px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(201,168,76,0.4);
    background: rgba(255,255,255,0.06);
  }
  .book-cover {
    aspect-ratio: 3/2;
    display: flex; align-items: center; justify-content: center;
    padding: 32px;
    position: relative; overflow: hidden;
  }
  .book-cover-inner {
    width: 100%; height: 100%;
    border-radius: 4px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; text-align: center;
    position: relative; overflow: hidden;
  }
  .book-cover-inner::before {
    content: ''; position: absolute; inset: 0;
    background: rgba(0,0,0,0.1);
  }
  .bc-1 { background: linear-gradient(135deg, #1A3A6B 0%, #0A1628 60%, #2A1A4A 100%); }
  .bc-2 { background: linear-gradient(135deg, #1A4A2B 0%, #0D2A18 60%, #2A3A1A 100%); }
  .bc-3 { background: linear-gradient(135deg, #3A1A10 0%, #1A0A08 60%, #3A2A10 100%); }
  .bc-4 { background: linear-gradient(135deg, #2A1A50 0%, #10082A 60%, #1A2A50 100%); }
  .bc-5 { background: linear-gradient(135deg, #1A2A40 0%, #0A1828 60%, #2A1A40 100%); }
  .bc-6 { background: linear-gradient(135deg, #3A2A10 0%, #1A1008 60%, #403020 100%); }
  .book-cover-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 700;
    color: var(--gold-light); line-height: 1.25;
    margin-bottom: 8px; position: relative; z-index: 1;
  }
  .book-cover-sub { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; color: rgba(255,255,255,0.5); text-transform: uppercase; position: relative; z-index: 1; }
  .book-cover-logo { font-family: 'Cormorant Garamond', serif; font-size: 13px; color: var(--gold); margin-top: 16px; position: relative; z-index: 1; }
  .book-badge {
    position: absolute; top: 16px; right: 16px;
    background: var(--gold);
    color: var(--navy); font-size: 10px; font-weight: 800;
    padding: 4px 10px; border-radius: 30px; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .book-info { padding: 24px; }
  .book-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 700;
    color: var(--white); margin-bottom: 8px; line-height: 1.3;
  }
  .book-desc { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.65; margin-bottom: 20px; }
  .book-features {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px;
  }
  .book-feat-tag {
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    color: var(--gold); background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 3px 10px; border-radius: 30px;
  }
  .book-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 16px; border-top: 1px solid rgba(201,168,76,0.12);
  }
